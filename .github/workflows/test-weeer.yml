# ── WeeeR Jest Tests — Sub-CMD-2 Wave 1 ──────────────────────────────────────
# รัน jest test suite สำหรับ WeeeR app บน PR และ push
# Template: App3R-Backend → HUB → WeeeR

name: WeeeR Tests

on:
  push:
    paths:
      - "apps/weeer/**"
      - ".github/workflows/test-weeer.yml"
  pull_request:
    paths:
      - "apps/weeer/**"
      - ".github/workflows/test-weeer.yml"

jobs:
  test:
    name: jest (WeeeR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Jest Tests
        working-directory: apps/weeer
        run: pnpm test:ci
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-weeer
          path: apps/weeer/coverage/
          retention-days: 7
