name: WeeeU — Jest Tests (Sub-CMD-2 Wave 1)

on:
  push:
    branches: [main, "sub-*", "fix/*", "feat/*"]
    paths:
      - "apps/weeeu/**"
      - ".github/workflows/test-weeeu.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/weeeu/**"

jobs:
  test-weeeu:
    name: WeeeU Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run WeeeU Jest Tests
        working-directory: apps/weeeu
        run: pnpm test:ci
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-weeeu
          path: apps/weeeu/coverage/
          retention-days: 7
