name: Backend Tests

on:
  push:
    branches: [main, 'sub-*']
    paths:
      - 'apps/backend/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'

jobs:
  test:
    name: Vitest + TypeCheck (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app3r
          POSTGRES_PASSWORD: app3r_test
          POSTGRES_DB: app3r_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app3r"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://app3r:app3r_test@localhost:5432/app3r_test
      JWT_SECRET: test-jwt-secret-at-least-32-characters-long
      NODE_ENV: test
      # SDK adapter vars (placeholder — unit tests mock these)
      R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: placeholder-key
      R2_SECRET_ACCESS_KEY: placeholder-secret
      R2_BUCKET: app3r-test
      MAPS_API_KEY: placeholder-maps-key
      RESEND_API_KEY: re_placeholder
      TWILIO_SMS_FROM: "+66000000000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm --filter @app3r/backend lint

      - name: Run DB migrations
        working-directory: apps/backend
        run: pnpm db:migrate

      - name: Run tests with coverage
        working-directory: apps/backend
        run: pnpm vitest run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: apps/backend/coverage/
          retention-days: 7

  # Sandbox smoke tests run separately (requires real API keys in GitHub Secrets)
  sandbox:
    name: Sandbox Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Only run with real secrets (skip on PRs from forks)
    environment: sandbox

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app3r
          POSTGRES_PASSWORD: app3r_test
          POSTGRES_DB: app3r_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app3r"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://app3r:app3r_test@localhost:5432/app3r_test
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: test
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TWILIO_SMS_FROM: ${{ secrets.TWILIO_SMS_FROM }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      TWOC2P_MERCHANT_ID: ${{ secrets.TWOC2P_MERCHANT_ID }}
      TWOC2P_SECRET_KEY: ${{ secrets.TWOC2P_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - working-directory: apps/backend
        run: pnpm db:migrate
      - name: Run sandbox smoke tests
        working-directory: apps/backend
        run: pnpm vitest run tests/sandbox/
