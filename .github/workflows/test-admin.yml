name: Test Admin (jest)

on:
  push:
    branches: [main, 'sub-*-wave*/**', 'worktree-*/**']
    paths:
      - 'apps/admin/**'
  pull_request:
    paths:
      - 'apps/admin/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run jest tests (Admin) (blocking — tests must pass)
        working-directory: apps/admin
        run: pnpm test:ci -- --coverage=false
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

      # POLICY (Advisor Ruling Gen 108 · 2026-06-02): ช่วง mockup → coverage = report-only (ไม่ block CI).
      # guard จริง (build/typecheck/เทสต์ผ่าน) ยัง block ที่ step ด้านบน. เปิด coverage blocking คืนตอน Phase 4.
      - name: Coverage report (report-only)
        working-directory: apps/admin
        run: pnpm test:ci
        continue-on-error: true
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-admin
          path: apps/admin/coverage/
          retention-days: 7
