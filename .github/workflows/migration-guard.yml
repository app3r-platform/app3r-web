name: Migration Guard (B1 / TD-W3-01)

# W-Round-1 Wave 1.2 [6]: B1 CI Guard — แทน `drizzle-kit check`
# DB เปล่า → apply SQL migrations 0000→ล่าสุด → introspect → assert structure ตรง schema
# + smoke route (D14). กัน structural drift หลุดเข้า main (ปิด D85).
#
# self-provision ephemeral DB เอง → ไม่พึ่ง db:migrate:all (เลี่ยง TD-W3-02 seed drift)

on:
  push:
    branches: [main, 'sub-*', 'feature/**']
    paths:
      - 'apps/backend/src/db/migrations/**'
      - 'apps/backend/src/db/schema/**'
      - 'apps/backend/tests/integration/migration-apply.test.ts'
      - '.github/workflows/migration-guard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/src/db/migrations/**'
      - 'apps/backend/src/db/schema/**'

jobs:
  migration-guard:
    name: migration-apply + introspect + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app3r
          POSTGRES_PASSWORD: app3r_test
          POSTGRES_DB: app3r_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app3r"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # guard สร้าง ephemeral DB เอง (ต้องมีสิทธิ์ CREATE DATABASE — app3r เป็น superuser ใน image นี้)
      DATABASE_URL: postgres://app3r:app3r_test@localhost:5432/app3r_test
      JWT_SECRET: test-jwt-secret-at-least-32-characters-long
      NODE_ENV: test
      # placeholder SDK envs (app boot สำหรับ smoke)
      R2_ENDPOINT: https://placeholder.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: placeholder-key
      R2_SECRET_ACCESS_KEY: placeholder-secret
      R2_BUCKET: app3r-test
      MAPS_API_KEY: placeholder-maps-key
      RESEND_API_KEY: re_placeholder
      TWILIO_SMS_FROM: "+66000000000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # version อ่านจาก package.json "packageManager" (pnpm@10.8.1) — ห้าม pin ซ้ำ
        # (pin version: + packageManager พร้อมกัน → ERR "Multiple versions of pnpm specified")
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migration-apply guard (structural drift + smoke)
        working-directory: apps/backend
        run: pnpm vitest run tests/integration/migration-apply.test.ts
