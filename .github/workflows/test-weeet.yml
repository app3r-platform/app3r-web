name: WeeeT — Jest Tests (Sub-CMD-2 Wave 1)

on:
  workflow_dispatch:
  push:
    branches: [main, "sub-*", "fix/*", "feat/*"]
    paths:
      - "apps/weeet/**"
      - ".github/workflows/test-weeet.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/weeet/**"

jobs:
  test-weeet:
    name: WeeeT Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run WeeeT Jest Tests (blocking — tests must pass)
        working-directory: apps/weeet
        run: pnpm exec jest --ci --forceExit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBUYIHBQFLXYp5Nksh8U

      # POLICY (Advisor Ruling Gen 108 · 2026-06-02): ช่วง mockup → coverage = report-only (ไม่ block CI).
      # guard จริง (build/typecheck/เทสต์ผ่าน) ยัง block ที่ step ด้านบน. เปิด coverage blocking คืนตอน Phase 4.
      - name: Coverage report (report-only)
        working-directory: apps/weeet
        run: pnpm test:ci
        continue-on-error: true
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBUYIHBQFLXYp5Nksh8U

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage-weeet
          path: apps/weeet/coverage/
          retention-days: 7
